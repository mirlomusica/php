<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title></title>
</head>

<body>

    <form id="selector" action="">
        <select name="encuestas" id="encuestas">
        </select>
        <button type="">muestra encuesta</button>
        <div id="mostrar">
        </div>
        <div id="graph">
            <div id="bar1" class="bar">

            </div>
            <div id="bar2" class="bar">

            </div>
            <div id="bar3" class="bar">

            </div>

        </div>
        <script>
            function animateBars(result) {

                let bar1 = document.getElementById("bar1");
                let bar2 = document.getElementById("bar2");
                let bar3 = document.getElementById("bar3");

                total = result.pregunta1 + result.pregunta2 + result.pregunta3;

                bar1.style.height = (result.pregunta1 / total) * 30 + "vh";
                bar1.innerHTML = result.opcion1 + ": " + result.pregunta1;

                bar2.style.height = (result.pregunta2 / total) * 30 + "vh";
                bar2.innerHTML = result.opcion2 + ": " + result.pregunta2;

                bar3.style.height = (result.pregunta3 / total) * 30 + "vh";
                bar3.innerHTML = result.opcion3 + ": " + result.pregunta3;
            }


            let enc = document.getElementById("encuestas");
            let selectedEnc = document.createElement("form");
            fetch("encuestas.php")
                .then(resp => resp.json())
                .then(data => {
                    console.log(data);
                    data.forEach((encuesta) => {
                        let opt = document.createElement("option");

                        opt.innerHTML = encuesta.textoEncuesta;
                        opt.value = encuesta.codigo;
                        enc.appendChild(opt);

                    })
                })
            let selector = document.getElementById("selector");
            selector.addEventListener("submit", (e) => {
                e.preventDefault();
                console.log(enc.value)
                data = new FormData();
                data.append("id", enc.value)
                fetch("encuesta_controller.php", {
                    body: data,
                    method: "POST"
                })
                    .then(resp => resp.json())
                    .then(encuesta => {
                        console.log(encuesta)
                        animateBars(encuesta);
                        selectedEnc.innerHTML = "";

                        title = document.createElement("h2")
                        title.innerHTML = encuesta.textoEncuesta;
                        selectedEnc.appendChild(title)
                        //encuesta 1
                        radio1 = document.createElement("input");
                        radio1.type = "radio"
                        radio1.name = "opcion";
                        radio1.value = 1
                        label = document.createElement("label");
                        label.innerHTML = encuesta.opcion1;
                        selectedEnc.appendChild(label);
                        selectedEnc.appendChild(radio1);

                        //encuesta 2
                        radio2 = document.createElement("input");
                        radio2.type = "radio"
                        radio2.name = "opcion";
                        radio2.value = 2
                        label = document.createElement("label");
                        label.innerHTML = encuesta.opcion2;
                        selectedEnc.appendChild(label);
                        selectedEnc.appendChild(radio2);

                        //encuesta 3
                        radio3 = document.createElement("input");
                        radio3.type = "radio"
                        radio3.name = "opcion";
                        radio3.value = 3
                        label = document.createElement("label");
                        label.innerHTML = encuesta.opcion3;
                        selectedEnc.appendChild(label);
                        selectedEnc.appendChild(radio3);


                        let id = document.createElement("input");
                        id.type = "hidden"
                        id.name = "id";
                        id.value = encuesta.codigo;
                        selectedEnc.appendChild(id)

                        let submit = document.createElement("input");
                        submit.type = "submit"
                        selectedEnc.appendChild(submit)


                        let mostrar = document.getElementById("mostrar");
                        mostrar.appendChild(selectedEnc);


                        selectedEnc.addEventListener("submit", (e) => {
                            e.preventDefault();
                            fetch("update_enc.php", {
                                body: new FormData(selectedEnc),
                                method: "POST"
                            })
                                .then(resp => resp.json())
                                .then(result => {
                                    console.log(result);
                                    animateBars(result);





                                })
                        })

                    })

            })



        </script>
    </form>
</body>

<style>
    html * {
        transition: 1s;

    }

    #graph {
        padding: 1vh;
        width: 40vw;
        height: 30vh;
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: end;
    }

    .bar {
        display: flex;
        align-items: end;
        justify-content: center;
        width: 10vw;
        height: 0px;

    }

    #bar1 {
        background-color: red;
    }

    #bar2 {
        background-color: yellow;
    }

    #bar3 {
        background-color: aqua;
    }
</style>

</html>
