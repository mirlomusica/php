<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <div id="tabla"></div>
        <script>
            let tabla = document.getElementById("tabla");
            fetch("PHP/mostrar.php")
                .then((resp) => resp.text())
                .then((data) => {
                    tabla.innerHTML = data;
                });
        </script>
    </body>
</html>
